version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: payment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payment_user -d payment_db']
      interval: 10s
      timeout: 5s
      retries: 5

  payment-processor:
    build:
      context: ./payment-processor-python
      dockerfile: Dockerfile
    container_name: payment_processor
    restart: unless-stopped
    env_file:
      - ./payment-processor-python/.env
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD-SHELL', 'python3 -c "import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")"']
      interval: 15s
      timeout: 5s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway-node/Dockerfile
    container_name: payment_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      payment-processor:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: '0.0.0.0'
      DATABASE_URL: postgresql://payment_user:payment_pass@postgres:5432/payment_db
      PYTHON_SERVICE_URL: http://payment-processor:5000
      LOG_LEVEL: info
    ports:
      - '3000:3000'

volumes:
  postgres_data:
